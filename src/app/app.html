<div class="dark h-screen overflow-hidden bg-slate-950 text-slate-100">
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -left-24 top-[-5rem] h-64 w-64 rounded-full bg-cyan-500/20 blur-3xl"></div>
    <div class="absolute right-[-6rem] top-[8rem] h-72 w-72 rounded-full bg-indigo-500/20 blur-3xl"></div>
    <div class="absolute bottom-[-8rem] left-1/3 h-80 w-80 rounded-full bg-emerald-500/10 blur-3xl"></div>
  </div>

  <div class="mx-auto flex h-screen max-w-7xl flex-col px-6 py-6 lg:px-10">
    <header class="mb-4 shrink-0 flex items-start justify-between rounded-2xl border border-white/10 bg-white/5 p-5 backdrop-blur-xl">
      <div>
        <h1 class="text-3xl font-bold tracking-tight text-slate-50">{{ appName() }}</h1>
        <p class="mt-1 text-sm text-slate-300/90">Microfrontend Dashboard</p>
      </div>
      <div class="text-right">
        <p class="text-xs uppercase tracking-widest text-slate-300/80">Owner</p>
        <p class="text-sm font-semibold text-slate-100">{{ ownerName() }}</p>
      </div>
    </header>

    <main class="flex-1 min-h-0 overflow-hidden">
      <mat-tab-group
        [selectedIndex]="activeTabIndex()"
        (selectedIndexChange)="onTabChange($event)"
        animationDuration="150ms"
        class="glass-tabs viewport-tabs h-full rounded-2xl border border-white/10 bg-white/5 p-3 backdrop-blur-xl">
        <mat-tab *ngFor="let tab of tabs(); let i = index">
          <ng-template mat-tab-label>
            <div class="flex items-center gap-2">
              <span class="text-sm font-semibold text-slate-100">{{ tab.label }}</span>
              <button
                type="button"
                class="rounded border border-cyan-300/30 bg-cyan-400/10 px-1.5 py-0.5 text-xs text-cyan-100 transition hover:bg-cyan-300/20"
                aria-label="Reload tab"
                title="Reload"
                (click)="reloadTab(tab, $event)">
                ↻
              </button>
              <button
                *ngIf="tab.id !== 'home'"
                type="button"
                class="rounded border border-rose-300/40 bg-rose-500/10 px-1.5 py-0.5 text-xs text-rose-100 transition"
                aria-label="Close tab"
                title="Close"
                (click)="closeTab(i, $event)">
                ✕
              </button>
            </div>
          </ng-template>

          <section class="h-full min-h-0 p-4">
            <ng-container *ngIf="tab.id === 'home'">
              <div class="mx-auto h-full max-w-5xl overflow-y-auto pr-1">
                <div class="mt-2 flex flex-wrap justify-center gap-5 pb-2">
                <button
                  type="button"
                  *ngFor="let card of childApps"
                  class="tw-focus-ring w-full max-w-sm rounded-2xl border border-white/15 bg-gradient-to-b from-white/15 to-white/5 p-5 text-left shadow-[0_8px_30px_rgba(0,0,0,0.35)] backdrop-blur-xl transition hover:-translate-y-1 hover:border-cyan-300/50 hover:from-cyan-300/15 hover:to-indigo-300/10"
                  (click)="openChildApp(card)">
                  <p class="text-lg font-bold tracking-wide text-slate-50">{{ card.title }}</p>
                  <p class="mt-2 text-sm font-normal leading-relaxed text-slate-200/90">{{ card.description }}</p>
                </button>
                </div>
              </div>
            </ng-container>

            <ng-container *ngIf="isRemoteTab(tab)">
              <div *ngIf="loadingFor(tab.id)" class="rounded-xl border border-white/15 bg-white/5 p-4 text-sm text-slate-100 backdrop-blur-lg">
                Loading {{ tab.label }}...
              </div>

              <div *ngIf="!loadingFor(tab.id) && errorFor(tab.id)" class="rounded-xl border border-rose-300/40 bg-rose-900/30 p-4 backdrop-blur-lg">
                <p class="text-sm text-rose-100">{{ errorFor(tab.id) }}</p>
                <button
                  type="button"
                  class="mt-3 rounded-lg border border-rose-200/50 bg-rose-400/10 px-3 py-1 text-xs text-rose-100 transition hover:bg-rose-300/20"
                  (click)="reloadTab(tab, $event)">
                  Retry
                </button>
              </div>

              <div *ngIf="!loadingFor(tab.id) && !errorFor(tab.id) && remoteCompFor(tab.id)" class="h-full min-h-0 rounded-xl border border-white/15 bg-slate-950/60 p-3 backdrop-blur-lg">
                <div class="h-full overflow-y-auto">
                  <ng-container *ngComponentOutlet="remoteCompFor(tab.id)"></ng-container>
                </div>
              </div>
            </ng-container>
          </section>
        </mat-tab>
      </mat-tab-group>
    </main>

    <footer class="mt-4 shrink-0 rounded-2xl border border-white/10 bg-white/5 p-4 text-sm text-slate-200/90 backdrop-blur-xl">
      <p>This application demonstrates a tab-based Angular microfrontend dashboard with shared theming.</p>
    </footer>
  </div>
</div>

<router-outlet />
